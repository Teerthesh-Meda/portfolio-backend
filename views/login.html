<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Teerthesh</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c10; --surface: #0f1520; --surface2: #161e2e;
      --accent: #00c8ff; --accent2: #0077ff;
      --text: #e8edf5; --muted: #7a8899; --border: rgba(0,200,255,0.12);
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(0,120,255,0.07), transparent 70%);
      pointer-events: none;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%; max-width: 420px;
      position: relative; overflow: hidden;
      animation: fadeUp 0.6s ease both;
    }
    .login-box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-icon {
      width: 56px; height: 56px;
      background: rgba(0,200,255,0.1);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem; font-weight: 800;
      margin-bottom: 0.4rem;
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2.5rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.2rem; }
    label { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
    input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.85rem 1.1rem;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,200,255,0.1);
    }
    .btn-login {
      width: 100%; padding: 0.95rem;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none; border-radius: 10px;
      color: #000; font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-top: 0.5rem;
      transition: all 0.25s;
      box-shadow: 0 0 30px rgba(0,200,255,0.2);
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(0,200,255,0.4); }
    .error {
      background: rgba(255,60,60,0.1); border: 1px solid rgba(255,60,60,0.3);
      color: #ff6b6b; border-radius: 8px; padding: 0.7rem 1rem;
      font-size: 0.85rem; margin-bottom: 1rem; display: none;
    }
    .hint {
      text-align: center; color: var(--muted); font-size: 0.78rem; margin-top: 1.5rem;
    }
    .hint code {
      background: var(--surface2); padding: 0.2rem 0.5rem;
      border-radius: 4px; color: var(--accent); font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <h1>Admin Login</h1>
    <p class="subtitle">Teerthesh's Portfolio Dashboard</p>
    <div class="error" id="error"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="teerthesh" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Login to Dashboard →</button>
    <p class="hint">Default: <code>teerthesh</code> / <code>admin123</code></p>
  </div>

  <script>
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    async function doLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const err = document.getElementById('error');
      const btn = document.getElementById('loginBtn');
      err.style.display = 'none';
      btn.textContent = 'Logging in...';
      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) { window.location.href = '/admin'; }
        else { err.textContent = data.error || 'Invalid credentials'; err.style.display = 'block'; btn.textContent = 'Login to Dashboard →'; }
      } catch(e) { err.textContent = 'Server error. Is the server running?'; err.style.display = 'block'; btn.textContent = 'Login to Dashboard →'; }
    }
  </script>
</body>
</html>
